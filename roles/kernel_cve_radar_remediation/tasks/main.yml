---
- name: Validate requested remediation action
  ansible.builtin.assert:
    that:
      - kernel_cve_radar_remediation_action in kernel_cve_radar_supported_actions
    fail_msg: >-
      Unsupported remediation action '{{ kernel_cve_radar_remediation_action | default('undefined') }}'.
      Supported actions: {{ kernel_cve_radar_supported_actions | join(', ') }}
  vars:
    kernel_cve_radar_supported_actions:
      - enable_maintenance
      - restore_site
      - sync_solution_from_git_and_deploy
      - sync_start_from_git_and_deploy
      - verify_fixed_site

- name: Run compact preflight checks
  ansible.builtin.include_tasks: preflight.yml

- name: Run requested remediation action
  ansible.builtin.include_tasks: "{{ kernel_cve_radar_remediation_action }}.yml"
