---
- name: AI/MCP remediation - Enable Kernel CVE Radar maintenance page
  hosts: "{{ target_hosts | default('cve_radar', true) }}"
  gather_facts: true
  become: true
  vars_files:
    - ../vars/project_defaults.yml
  vars:
    kernel_cve_radar_remediation_action: enable_maintenance
  roles:
    - kernel_cve_radar_remediation
