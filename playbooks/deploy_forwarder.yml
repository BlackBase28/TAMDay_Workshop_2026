---
- name: Deploy Kernel CVE Radar EDA forwarder
  hosts: all
  become: true
  gather_facts: true
  # SSH authentication is supplied by the AAP Machine Credential or inventory.
  # cve_radar_mcp_user defaults to ansible_user. Override it when the RHEL MCP
  # policy connects with a different SSH account.
  roles:
    - cve_radar_eda_forwarder
