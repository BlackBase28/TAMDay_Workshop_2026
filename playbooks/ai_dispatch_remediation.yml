---
- name: AI/MCP remediation - dispatch by governed recommendation
  hosts: "{{ target_hosts | default('cve_radar', true) }}"
  gather_facts: true
  become: true
  vars_files:
    - ../vars/project_defaults.yml
  vars:
    ai_recommended_next_step: "{{ recommended_next_step | default('collect_more_evidence', true) }}"
    ai_next_step_to_remediation_action:
      repair_web_code: sync_solution_from_git_and_deploy
      enable_maintenance_page: enable_maintenance
      isolate_site: enable_maintenance
      switch_to_maintenance: enable_maintenance
      maintenance_mode: enable_maintenance
      sync_solution_from_git_and_deploy: sync_solution_from_git_and_deploy
      sync_solution_from_git: sync_solution_from_git_and_deploy
      deploy_solution_from_git: sync_solution_from_git_and_deploy
      deploy_fixed_code: sync_solution_from_git_and_deploy
      verify_fixed_site_before_restore: verify_fixed_site_pre_restore
      pre_restore_validation: verify_fixed_site_pre_restore
      verify_fixed_site: verify_fixed_site
      post_remediation_validation: verify_fixed_site
      restore_login_page: restore_site
      restore_normal_site: restore_site
      disable_maintenance_page: restore_site
      sync_start_from_git_and_deploy: sync_start_from_git_and_deploy
      reset_to_start_version: sync_start_from_git_and_deploy
      restore_vulnerable_demo: sync_start_from_git_and_deploy
      reset_lab_to_vulnerable_state: sync_start_from_git_and_deploy
      send_slack_alert: send_slack_alert
      slack_alert: send_slack_alert
      notify_slack: send_slack_alert
  tasks:
    - name: Resolve remediation action from AI recommendation
      ansible.builtin.set_fact:
        kernel_cve_radar_remediation_action: "{{ ai_next_step_to_remediation_action.get(ai_recommended_next_step, 'noop') }}"

    - name: Show governed action selection
      ansible.builtin.debug:
        msg:
          recommended_next_step: "{{ ai_recommended_next_step }}"
          resolved_action: "{{ kernel_cve_radar_remediation_action }}"
          investigation_id: "{{ investigation_id | default('') }}"

    - name: Run controlled remediation role
      ansible.builtin.include_role:
        name: kernel_cve_radar_remediation
      when: kernel_cve_radar_remediation_action != 'noop'

    - name: No-op for unmapped recommendation
      ansible.builtin.debug:
        msg: "Recommendation is not in the allow-list; no host changes were made."
      when: kernel_cve_radar_remediation_action == 'noop'
