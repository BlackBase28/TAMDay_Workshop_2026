---
- name: AI/MCP remediation - Verify Kernel CVE Radar fixed backend before restore
  hosts: "{{ target_hosts | default('cve_radar', true) }}"
  gather_facts: true
  become: true
  vars_files:
    - ../vars/project_defaults.yml
  vars:
    kernel_cve_radar_remediation_action: verify_fixed_site
    kernel_cve_radar_verify_stage: pre_restore
  roles:
    - kernel_cve_radar_remediation
