---
# Event Stream settings. Existing AAP variables remain supported.
cve_radar_event_stream_url: "{{ eda_event_stream_url | default('', true) }}"
cve_radar_event_stream_token: "{{ eda_event_stream_token | default('', true) }}"
cve_radar_event_stream_auth_header: "{{ eda_event_stream_auth_header | default('X-CVE-Radar-Token', true) }}"
cve_radar_event_stream_auth_scheme: "{{ eda_event_stream_auth_scheme | default('', true) }}"
cve_radar_event_stream_verify_tls: "{{ eda_event_stream_verify_tls | default(false) | bool }}"
cve_radar_event_stream_ca_file: "{{ eda_event_stream_ca_file | default('', true) }}"

cve_radar_forwarder_user: cve-radar-eda-forwarder
cve_radar_forwarder_group: cve-radar-eda-forwarder
cve_radar_forwarder_script: /usr/local/sbin/cve_radar_event_forwarder.py
cve_radar_forwarder_env_file: /etc/cve-radar-eda-forwarder.env
cve_radar_forwarder_service: cve-radar-eda-forwarder.service
cve_radar_forwarder_state_dir: /var/lib/cve-radar-eda-forwarder
cve_radar_forwarder_start_at_end: true

cve_radar_log_dir: /var/log/kernel-cve-radar
cve_radar_application_log_owner: "{{ cve_radar_log_owner | default(1001) }}"
cve_radar_application_log_group: "{{ cve_radar_log_group | default(1001) }}"
cve_radar_auth_event_log: "{{ cve_radar_log_file | default('/var/log/kernel-cve-radar/auth-events.jsonl', true) }}"
cve_radar_app_access_log: /var/log/kernel-cve-radar/access.log
cve_radar_httpd_access_log: "{{ cve_radar_web_access_log | default('/var/log/httpd/access_log', true) }}"
cve_radar_httpd_ssl_access_log: /var/log/httpd/ssl_access_log
cve_radar_httpd_error_log: /var/log/httpd/error_log
cve_radar_httpd_ssl_error_log: /var/log/httpd/ssl_error_log
cve_radar_web_access_enabled: "{{ cve_radar_web_access_log_enabled | default(false) | bool }}"

cve_radar_trusted_proxy_cidrs:
  - 10.88.0.0/16
  - 127.0.0.0/8
  - ::1/128
cve_radar_admin_path_prefixes: [/admin]
cve_radar_admin_usernames: [admin, administrator]
cve_radar_web_ignore_path_prefixes: [/static/, /assets/, /favicon.ico, /robots.txt, /health, /healthz]
cve_radar_web_ignore_path_suffixes: [.css, .js, .map, .png, .jpg, .jpeg, .gif, .svg, .ico, .woff, .woff2, .ttf]
cve_radar_forwarder_poll_interval: 1.0

# RHEL MCP log-reader ACL settings. By default, grant the inventory SSH user
# read-only access to the application authentication log and optional httpd logs.
cve_radar_mcp_log_acl_enabled: true
cve_radar_mcp_user: "{{ ansible_user | default('', true) }}"
cve_radar_mcp_read_application_logs: true
cve_radar_mcp_read_httpd_logs: true

# Lab 2 trigger: every successful admin login is forwarded to EDA.
# AI uses RHEL MCP to inspect the preceding five-minute authentication window.
